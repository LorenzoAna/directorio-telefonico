<app-sidebar></app-sidebar>
<div class="container">
  <div class="row">
    <div class="col">
      <div class="d-flex justify-content-between">
        <h2>Bienvenido/a, {{ userName }}</h2>
        <h3 class="">Panel de usuario</h3>
      </div>
      <!--       Segun el ROL       -->
      <div *ngIf="userDetails$ | async as userDetails; else noUserDetails">
        <h2 class="display-4 mb-4">
          Lista de contactos de {{ userDetails.name }}
        </h2>
      </div>
      <ng-template #noUserDetails>
        <h2 class="display-4 mb-4">Lista de contactos</h2>
      </ng-template>

      <div class="order-select col-3 my-3">
        <app-reusable-select
          (orderChange)="onOrderChange($event)"
        ></app-reusable-select>
      </div>
      <div
        *ngIf="contacts$ | async as contacts"
        class="list-container d-flex gap-4 flex-wrap justify-content-center mb-5"
      >
        <app-contact-card
          *ngFor="let contact of contacts"
          [contact]="contact"
          (contactDeleted)="onContactDeleted($event)"
        ></app-contact-card>
      </div>
    </div>
  </div>
</div>
